name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Create the .env file that is required by the Secrets Gradle Plugin
      - name: Create .env file
        run: echo "GEMINI_API_KEY=dummy_key" > .env

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # Since gradlew is not checked into the repository, we generate it first using runner's preinstalled gradle.
      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 9.3.1

      # Grant execute permission for gradlew
      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: playfutebol-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
